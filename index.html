<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-BOZKURT PRO</title>
    <style>
        :root { --neon: #3b82f6; }
        body { margin: 0; background: #020617; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #stats { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px var(--neon); }
        
        #leaderboard { position: absolute; right: 10px; top: 80px; background: rgba(15, 23, 42, 0.9); padding: 10px; border-radius: 12px; width: 140px; border: 1px solid var(--neon); font-size: 12px; }
        .top-score { color: #fbbf24; border-bottom: 1px solid #fbbf24; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; }
        .char-select { display: flex; gap: 20px; margin: 20px 0; }
        .char-box { width: 60px; height: 60px; border: 3px solid #334155; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 30px; transition: 0.3s; }
        .char-box.active { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); transform: scale(1.1); }
        
        .btn { padding: 15px 50px; background: var(--neon); border: none; border-radius: 50px; color: white; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .msg { color: #94a3b8; margin: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats">
        <div>SKOR: <span id="curScore">0</span></div>
        <div style="color: #ef4444;">CAN: <span id="curLives">2</span></div>
    </div>
    <div id="leaderboard">
        <div style="text-align:center; color:var(--neon); margin-bottom:5px; font-weight:bold;">🏆 TOP 10</div>
        <div id="scores">Yükleniyor...</div>
    </div>
</div>

<div id="overlay">
    <h1 style="color:var(--neon); letter-spacing: 5px;">T-BOZKURT</h1>
    <div class="msg" id="welcomeMsg">Karakterini Seç ve Başla</div>
    <div class="char-select">
        <div class="char-box active" onclick="selectChar(0, '#3b82f6')">🟦</div>
        <div class="char-box" onclick="selectChar(1, '#a855f7')">🔮</div>
        <div class="char-box" onclick="selectChar(2, '#22c55e')">🍀</div>
    </div>
    <button class="btn" onclick="startGame()">SAVAŞI BAŞLAT</button>
</div>

<canvas id="game"></canvas>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDJ0LSQIv5KDPC-tJwDHdeN6nmzk2JcflM",
    authDomain: "kaangame-bfea0.firebaseapp.com",
    databaseURL: "https://kaangame-bfea0-default-rtdb.firebaseio.com",
    projectId: "kaangame-bfea0",
    storageBucket: "kaangame-bfea0.firebasestorage.app",
    messagingSenderId: "889267308539",
    appId: "1:889267308539:web:4afa1e9705647b0445ad5e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let oyuncuAdi = localStorage.getItem("t_bozkurt_name") || "";
if(!oyuncuAdi) {
    oyuncuAdi = prompt("Lakabını gir (Tek seferlik):", "Bozkurt");
    if(!oyuncuAdi) oyuncuAdi = "User" + Math.floor(Math.random()*999);
    localStorage.setItem("t_bozkurt_name", oyuncuAdi);
}

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let gameState = "MENU", score = 0, lives = 2, obstacles = [], particles = [], frame = 0, speed = 5;
let playerColor = "#3b82f6";

const player = { x: 60, y: 0, vy: 0, gravity: 0.55, jump: -8.5, size: 35 };

function selectChar(idx, color) {
    const boxes = document.querySelectorAll('.char-box');
    boxes.forEach(b => b.classList.remove('active'));
    boxes[idx].classList.add('active');
    playerColor = color;
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    player.y = canvas.height / 2;
}
window.onresize = resize;
resize();

function startGame() {
    document.getElementById("overlay").style.display = "none";
    gameState = "PLAYING";
    score = 0;
    lives = 2;
    speed = 5;
    obstacles = [];
    player.y = canvas.height / 2;
    player.vy = 0;
    updateUI();
}

function updateUI() {
    document.getElementById("curScore").innerText = score;
    document.getElementById("curLives").innerText = lives;
}

function triggerExplosion(x, y, color) {
    for(let i=0; i<10; i++) {
        particles.push({ x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color });
    }
}

function gameOver() {
    gameState = "MENU";
    // Skor kaydı - Sadece daha yüksekse günceller (tekil kullanıcı)
    const userRef = db.ref("leaderboard/" + oyuncuAdi);
    userRef.once("value", (s) => {
        if(!s.exists() || s.val().score < score) {
            userRef.set({ name: oyuncuAdi, score: score, date: Date.now() });
        }
    });

    document.getElementById("overlay").style.display = "flex";
    document.getElementById("welcomeMsg").innerText = "SKORUN: " + score + "\nTekrar Hazır mısın?";
}

function loop() {
    ctx.fillStyle = "#020617";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if(gameState === "PLAYING") {
        player.vy += player.gravity;
        player.y += player.vy;

        if(player.y + player.size > canvas.height || player.y < 0) {
            lives--;
            updateUI();
            if(lives <= 0) gameOver();
            else { player.y = canvas.height/2; player.vy = 0; triggerExplosion(player.x, player.y, "#ef4444"); }
        }

        if(frame % 90 === 0) {
            let gap = Math.max(170, 220 - (score*1.5));
            let h = Math.random() * (canvas.height - gap - 100) + 50;
            obstacles.push({ x: canvas.width, y: 0, w: 70, h: h, passed: false });
            obstacles.push({ x: canvas.width, y: h + gap, w: 70, h: canvas.height });
        }
        frame++;

        for(let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= speed;

            ctx.fillStyle = "#1e293b";
            ctx.strokeStyle = playerColor;
            ctx.lineWidth = 2;
            ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.strokeRect(o.x, o.y, o.w, o.h);

            if(player.x < o.x + o.w && player.x + player.size > o.x && player.y < o.y + o.h && player.y + player.size > o.y) {
                lives--;
                updateUI();
                triggerExplosion(player.x, player.y, "#ef4444");
                obstacles.splice(0, obstacles.length); // Boruları temizle
                if(lives <= 0) gameOver();
                break;
            }

            if(o.y === 0 && !o.passed && o.x + o.w < player.x) {
                score++;
                o.passed = true;
                updateUI();
                if(score % 35 === 0) { lives++; updateUI(); triggerExplosion(player.x, player.y, "#22c55e"); }
                if(score % 5 === 0) speed += 0.2;
            }
            if(o.x < -100) obstacles.splice(i, 1);
        }
    }

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 5, 5);
        if(p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;

    // Oyuncu
    ctx.fillStyle = playerColor;
    ctx.shadowBlur = 15; ctx.shadowColor = playerColor;
    ctx.fillRect(player.x, player.y, player.size, player.size);
    ctx.shadowBlur = 0;

    requestAnimationFrame(loop);
}

const jump = (e) => { 
    if(e.type === 'touchstart') e.preventDefault();
    if(gameState === "PLAYING") player.vy = player.jump; 
};
window.addEventListener("mousedown", jump);
window.addEventListener("touchstart", jump, {passive: false});

function loadLeaderboard() {
    // 'leaderboard' düğümünden çekerek her kullanıcıyı bir kez gösteriyoruz
    db.ref("leaderboard").orderByChild("score").limitToLast(10).on("value", snap => {
        let arr = [];
        snap.forEach(child => { arr.push(child.val()); });
        arr.sort((a, b) => b.score - a.score);
        let html = "";
        arr.forEach((s, i) => {
            html += `<div class="${i===0?'top-score':''}">#${i+1} ${s.name.slice(0,8)}: ${s.score}</div>`;
        });
        document.getElementById("scores").innerHTML = html || "Yarışmacı yok";
    });
}

loadLeaderboard();
loop();
</script>
</body>
</html>
