<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-BOZKURT: UNIVERSE</title>
    <style>
        :root { --p-color: #3b82f6; --bg-main: #020617; }
        body { margin: 0; background: var(--bg-main); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; }
        canvas { display: block; }
        
        /* UI Katmanları */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #stats { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 14px; font-weight: 900; }
        .stat-item { padding: 8px 12px; background: rgba(15, 23, 42, 0.9); border-radius: 15px; border: 1px solid var(--p-color); box-shadow: 0 0 10px var(--p-color); }
        
        /* Market ve Menü Paneli */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; align-items: center; z-index: 100; pointer-events: auto; overflow-y: auto; padding-top: 40px; }
        .wallet-info { font-size: 24px; color: #fbbf24; font-weight: bold; margin-bottom: 20px; }
        
        .mode-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .mode-card { width: 140px; padding: 20px; background: #1e293b; border: 2px solid #334155; border-radius: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .mode-card.active { border-color: #3b82f6; box-shadow: 0 0 20px #3b82f6; background: #0f172a; }

        .market-section { width: 90%; max-width: 400px; background: rgba(30, 41, 59, 0.5); padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .market-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #334155; }
        .buy-btn { background: #10b981; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .buy-btn.owned { background: #475569; cursor: default; }

        .btn-start { padding: 15px 60px; background: #3b82f6; border: none; border-radius: 50px; color: white; font-size: 24px; font-weight: 900; cursor: pointer; margin: 20px 0; }
        
        /* Yetenek Barı */
        #ability-bar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid #334155; overflow: hidden; }
        #ability-bar { width: 0%; height: 100%; background: #3b82f6; transition: 0.3s; }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats">
        <div class="stat-item">🏆 <span id="curScore">0</span></div>
        <div class="stat-item" style="border-color:#fbbf24;">💰 <span id="curCoins">0</span></div>
        <div class="stat-item" style="border-color:#ef4444;">❤️ <span id="curLives">2</span></div>
    </div>
    <div id="ability-bar-container"><div id="ability-bar"></div></div>
</div>

<div id="overlay">
    <h1 style="color:white; margin:0;">T-BOZKURT</h1>
    <div class="wallet-info">💰 <span id="totalWallet">0</span></div>

    <div class="mode-container">
        <div class="mode-card active" id="modeClassic">
            <div style="font-size:30px;">🐺</div>
            <div style="font-weight:bold; margin-top:10px;">KLASİK</div>
            <div style="font-size:10px; color:#94a3b8;">Boru Geçişi & Can</div>
        </div>
        <div class="mode-card" id="modeRain">
            <div style="font-size:30px;">🌧️</div>
            <div style="font-weight:bold; margin-top:10px;">YAĞMUR</div>
            <div style="font-size:10px; color:#94a3b8;">Coin & Bomba</div>
        </div>
    </div>

    <div class="market-section">
        <div style="text-align:center; font-weight:bold; color:#3b82f6; margin-bottom:10px;">MARKET</div>
        <div class="market-item">
            <span>🌲 Orman Teması</span>
            <button class="buy-btn" id="buyForest" onclick="buyItem('forest', 150)">150 💰</button>
        </div>
        <div class="market-item">
            <span>🚀 Uzay Teması</span>
            <button class="buy-btn" id="buySpace" onclick="buyItem('space', 300)">300 💰</button>
        </div>
        <div class="market-item">
            <span>🦅 Kartal Karakteri</span>
            <button class="buy-btn" id="buyEagle" onclick="buyItem('eagle', 500)">500 💰</button>
        </div>
    </div>

    <button class="btn-start" onclick="launchGame()">SAVAŞI BAŞLAT</button>
    <div style="font-size:11px; color:#60a5fa; cursor:pointer;" onclick="changeName()">⚙️ İsim Değiştir</div>
</div>

<canvas id="game"></canvas>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// Firebase Konfigürasyonu
const firebaseConfig = { apiKey: "AIzaSyDJ0LSQIv5KDPC-tJwDHdeN6nmzk2JcflM", authDomain: "kaangame-bfea0.firebaseapp.com", databaseURL: "https://kaangame-bfea0-default-rtdb.firebaseio.com", projectId: "kaangame-bfea0", storageBucket: "kaangame-bfea0.firebasestorage.app", messagingSenderId: "889267308539", appId: "1:889267308539:web:4afa1e9705647b0445ad5e" };
firebase.initializeApp(firebaseConfig); const db = firebase.database();

// Değişkenler
let myName = localStorage.getItem("tb_name") || "Oyuncu";
let myWallet = parseInt(localStorage.getItem("tb_wallet") || "0");
let myItems = JSON.parse(localStorage.getItem("tb_items") || '{"forest":false, "space":false, "eagle":false}');
let currentTheme = "default";
let selectedMode = "CLASSIC";

const canvas = document.getElementById("game"); const ctx = canvas.getContext("2d");
let gameState = "MENU", score = 0, coins = 0, lives = 2, frame = 0, invul = 0, collectedOrbs = 0, isWolf = 0;
let obstacles = [], rainItems = [], orbs = [];
const player = { x: 70, y: 0, vy: 0, gravity: 0.52, jump: -8.2, size: 35, emoji: "🐺" };

function updateMenu() {
    document.getElementById("totalWallet").innerText = myWallet;
    document.getElementById("buyForest").innerText = myItems.forest ? "SEÇ" : "150 💰";
    document.getElementById("buySpace").innerText = myItems.space ? "SEÇ" : "300 💰";
    document.getElementById("buyEagle").innerText = myItems.eagle ? "SEÇ" : "500 💰";
}
updateMenu();

// Market Fonksiyonu
function buyItem(item, price) {
    if (myItems[item]) {
        currentTheme = item;
        if(item === 'eagle') player.emoji = "🦅";
        alert(item.toUpperCase() + " seçildi!");
        return;
    }
    if (myWallet >= price) {
        myWallet -= price;
        myItems[item] = true;
        localStorage.setItem("tb_wallet", myWallet);
        localStorage.setItem("tb_items", JSON.stringify(myItems));
        updateMenu();
    } else {
        alert("Yeterli coin yok!");
    }
}

// Mod Seçimi
document.getElementById("modeClassic").onclick = () => { selectedMode = "CLASSIC"; document.getElementById("modeClassic").classList.add("active"); document.getElementById("modeRain").classList.remove("active"); };
document.getElementById("modeRain").onclick = () => { selectedMode = "RAIN"; document.getElementById("modeRain").classList.add("active"); document.getElementById("modeClassic").classList.remove("active"); };

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function launchGame() {
    document.getElementById("overlay").style.display = "none";
    gameState = "PLAYING"; score = 0; coins = 0; frame = 0; invul = 0; collectedOrbs = 0; isWolf = 0;
    lives = 2; player.y = canvas.height/2; player.vy = 0;
    obstacles = []; rainItems = []; orbs = [];
    updateStats();
}

function updateStats() {
    document.getElementById("curScore").innerText = score;
    document.getElementById("curCoins").innerText = coins;
    document.getElementById("curLives").innerText = lives;
    document.getElementById("ability-bar").style.width = (collectedOrbs / 3 * 100) + "%";
}

function handleDeath() {
    if (invul > 0 || isWolf > 0) return;
    lives--; invul = 120; updateStats();
    if (lives <= 0) {
        gameState = "MENU";
        myWallet += coins;
        localStorage.setItem("tb_wallet", myWallet);
        db.ref("leaderboard/"+myName).set({name: myName, score: score});
        document.getElementById("overlay").style.display = "flex";
        updateMenu();
    }
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Tema Arka Planları
    if(currentTheme === "forest") ctx.fillStyle = "#064e3b";
    else if(currentTheme === "space") ctx.fillStyle = "#0f172a";
    else ctx.fillStyle = "#020617";
    ctx.fillRect(0,0,canvas.width, canvas.height);

    if (gameState === "PLAYING") {
        let speed = 5 + (score / 10);
        player.vy += player.gravity; player.y += player.vy;
        if(invul > 0) invul--; if(isWolf > 0) isWolf--;

        if (player.y + player.size > canvas.height || player.y < 0) {
            if(invul === 0) handleDeath();
            player.y = player.y < 0 ? 0 : canvas.height - player.size;
            player.vy = 0;
        }

        // --- KLASİK MOD MANTIĞI ---
        if (selectedMode === "CLASSIC") {
            if (frame % 90 === 0) {
                let gap = 190; let h = Math.random() * (canvas.height - gap - 100) + 50;
                obstacles.push({x: canvas.width, y: 0, w: 70, h: h, p: false});
                obstacles.push({x: canvas.width, y: h + gap, w: 70, h: canvas.height});
                if(Math.random() > 0.7) orbs.push({x: canvas.width+100, y: h+(gap/2)});
            }
            obstacles.forEach((o, i) => {
                o.x -= speed;
                ctx.fillStyle = (isWolf > 0 || invul > 0) ? "rgba(59,130,246,0.3)" : "#1e293b";
                ctx.strokeStyle = "#3b82f6"; ctx.strokeRect(o.x, o.y, o.w, o.h); ctx.fillRect(o.x, o.y, o.w, o.h);
                if (invul === 0 && isWolf === 0 && player.x < o.x + o.w && player.x + player.size > o.x && player.y < o.y + o.h && player.y + player.size > o.y) handleDeath();
                if (o.y === 0 && !o.p && o.x + o.w < player.x) { score++; coins++; o.p = true; updateStats(); if(score%35===0) lives++; }
            });
        }

        // --- YAĞMUR MODU MANTIĞI ---
        if (selectedMode === "RAIN") {
            if (frame % 40 === 0) {
                let type = Math.random();
                let item = { x: Math.random() * (canvas.width - 30), y: -50, s: 5 };
                if (type < 0.6) item.kind = "COIN";
                else if (type < 0.9) item.kind = "BOMB";
                else item.kind = "HEART";
                rainItems.push(item);
            }
            rainItems.forEach((it, i) => {
                it.y += it.s + (score/20);
                if(it.kind === "COIN") { ctx.font = "20px Arial"; ctx.fillText("💰", it.x, it.y); }
                else if(it.kind === "BOMB") { ctx.font = "20px Arial"; ctx.fillText("💣", it.x, it.y); }
                else { ctx.font = "20px Arial"; ctx.fillText("❤️", it.x, it.y); }

                if (Math.hypot(player.x - it.x, player.y - it.y) < 35) {
                    if (it.kind === "COIN") { coins++; score++; }
                    else if (it.kind === "BOMB") handleDeath();
                    else { lives++; }
                    updateStats(); rainItems.splice(i, 1);
                }
            });
        }

        // Mavi Küreler
        orbs.forEach((o, i) => {
            o.x -= speed; ctx.font = "25px Arial"; ctx.fillText("🔵", o.x, o.y);
            if(Math.hypot(player.x-o.x, player.y-o.y) < 40) { collectedOrbs = Math.min(3, collectedOrbs+1); updateStats(); orbs.splice(i,1); }
        });

        frame++;
        ctx.font = player.size + "px Arial";
        if(invul % 10 > 5) ctx.globalAlpha = 0.3;
        if(isWolf > 0) { ctx.shadowBlur = 20; ctx.shadowColor = "gold"; }
        ctx.fillText(player.emoji, player.x, player.y + player.size);
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
    requestAnimationFrame(loop);
}

// Kontroller
const jump = (e) => { 
    if(gameState === "PLAYING") { player.vy = player.jump; } 
};
window.addEventListener("touchstart", jump);
window.addEventListener("mousedown", jump);
// Bozkurt Modu Aktivasyonu (Bara Tıklama)
document.getElementById("ability-bar-container").onclick = () => {
    if(collectedOrbs >= 3) { isWolf = 360; collectedOrbs = 0; updateStats(); }
};

function changeName() { let n = prompt("Yeni isim:"); if(n) { myName = n; localStorage.setItem("tb_name", n); } }

requestAnimationFrame(loop);
</script>
</body>
</html>
