<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-BOZKURT X-PRO MAX</title>
    <style>
        :root { --p-color: #3b82f6; }
        body { margin: 0; background: #020617; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #stats { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 20px; font-weight: 900; }
        .stat-item { padding: 5px 12px; background: rgba(15, 23, 42, 0.7); border-radius: 20px; border: 1px solid var(--p-color); box-shadow: 0 0 10px var(--p-color); }
        
        #leaderboard { position: absolute; right: 10px; top: 80px; background: rgba(15, 23, 42, 0.95); padding: 12px; border-radius: 12px; width: 140px; border: 1px solid var(--p-color); font-size: 12px; }
        .top-score { color: #fbbf24; font-weight: bold; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #020617; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; text-align: center; }
        .char-select { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
        .char-box { width: 60px; height: 60px; border: 2px solid #1e293b; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 30px; transition: 0.2s; background: #0f172a; }
        .char-box.active { border-color: var(--p-color); box-shadow: 0 0 20px var(--p-color); transform: scale(1.1); }
        
        .btn-start { padding: 15px 50px; background: var(--p-color); border: none; border-radius: 50px; color: white; font-size: 22px; font-weight: 900; cursor: pointer; box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); -webkit-appearance: none; }
        
        #user-area { margin-bottom: 20px; }
        .edit-name { font-size: 14px; color: #60a5fa; text-decoration: underline; cursor: pointer; margin-top: 5px; pointer-events: auto; }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats">
        <div class="stat-item">🏆 <span id="curScore">0</span></div>
        <div class="stat-item" style="border-color:#ef4444;">❤️ <span id="curLives">2</span></div>
    </div>
    <div id="leaderboard">
        <div style="text-align:center; color:var(--p-color); font-weight:bold; margin-bottom:5px;">LİDERLER</div>
        <div id="scores">Yükleniyor...</div>
    </div>
</div>

<div id="overlay">
    <h1 style="color:white; font-size: 36px; margin: 0; text-shadow: 0 0 15px #3b82f6;">T-BOZKURT</h1>
    
    <div id="user-area">
        <div style="font-size: 18px; color: #94a3b8;">Hoş Geldin, <b id="welcomeUser" style="color:white;"></b></div>
        <div class="edit-name" id="editBtn" onclick="changeName()">⚙️ İsmi Değiştir (Hak: <span id="nameRights"></span>)</div>
    </div>

    <div class="char-select">
        <div class="char-box active" onclick="selectChar(0, '#3b82f6', '🐺')">🐺</div>
        <div class="char-box" onclick="selectChar(1, '#a855f7', '🔮')">🔮</div>
        <div class="char-box" onclick="selectChar(2, '#22c55e', '🍀')">🍀</div>
        <div class="char-box" onclick="selectChar(3, '#f59e0b', '🟦')">🟦</div>
    </div>
    
    <button class="btn-start" id="startBtn">OYUNU BAŞLAT</button>
</div>

<canvas id="game"></canvas>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDJ0LSQIv5KDPC-tJwDHdeN6nmzk2JcflM",
    authDomain: "kaangame-bfea0.firebaseapp.com",
    databaseURL: "https://kaangame-bfea0-default-rtdb.firebaseio.com",
    projectId: "kaangame-bfea0",
    storageBucket: "kaangame-bfea0.firebasestorage.app",
    messagingSenderId: "889267308539",
    appId: "1:889267308539:web:4afa1e9705647b0445ad5e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- KULLANICI YÖNETİMİ ---
let oyuncuAdi = localStorage.getItem("t_bozkurt_user");
let nameRights = parseInt(localStorage.getItem("t_bozkurt_rights") || "2");

function initUser() {
    if(!oyuncuAdi) {
        oyuncuAdi = prompt("Lakabını Seç:", "Bozkurt");
        if(!oyuncuAdi) oyuncuAdi = "User" + Math.floor(Math.random()*999);
        localStorage.setItem("t_bozkurt_user", oyuncuAdi);
    }
    document.getElementById("welcomeUser").innerText = oyuncuAdi;
    document.getElementById("nameRights").innerText = nameRights;
}

function changeName() {
    if(nameRights > 0) {
        let yeniAd = prompt("Yeni Lakabını Gir (Hak: " + nameRights + "):");
        if(yeniAd && yeniAd.trim() !== "") {
            oyuncuAdi = yeniAd.trim();
            nameRights--;
            localStorage.setItem("t_bozkurt_user", oyuncuAdi);
            localStorage.setItem("t_bozkurt_rights", nameRights);
            initUser();
            alert("İsmin güncellendi!");
        }
    } else {
        alert("İsim değiştirme hakkın doldu!");
    }
}
initUser();

// --- OYUN MOTORU ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let gameState = "MENU", score = 0, lives = 2, obstacles = [], particles = [], frame = 0, speed = 5, shake = 0;
let playerColor = "#3b82f6", playerEmoji = "🐺", invul = 0;

const player = { x: 60, y: 0, vy: 0, gravity: 0.52, jump: -8.2, size: 35 };

function selectChar(idx, color, emoji) {
    document.querySelectorAll('.char-box').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.char-box')[idx].classList.add('active');
    playerColor = color; playerEmoji = emoji;
    document.documentElement.style.setProperty('--p-color', color);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    player.y = canvas.height / 2;
}
window.onresize = resize; resize();

// TELEFONDA BAŞLAT BUTONU İÇİN KESİN ÇÖZÜM
function startGame() {
    if(gameState === "PLAYING") return;
    document.getElementById("overlay").style.display = "none";
    gameState = "PLAYING";
    score = 0; lives = 2; speed = 5; obstacles = [];
    player.y = canvas.height / 2; player.vy = 0;
    updateUI();
}

document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("startBtn").addEventListener("touchend", (e) => {
    e.preventDefault(); startGame();
});

function updateUI() {
    document.getElementById("curScore").innerText = score;
    document.getElementById("curLives").innerText = lives;
}

function spawnParticles(x, y, color) {
    for(let i=0; i<12; i++) {
        particles.push({ x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color });
    }
}

function gameOver() {
    gameState = "MENU";
    const userRef = db.ref("leaderboard/" + oyuncuAdi);
    userRef.once("value", (s) => {
        if(!s.exists() || s.val().score < score) {
            userRef.set({ name: oyuncuAdi, score: score, t: Date.now() });
        }
    });
    document.getElementById("overlay").style.display = "flex";
}

function loop() {
    ctx.fillStyle = "#020617";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if(gameState === "PLAYING") {
        if(shake > 0) {
            ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);
            shake *= 0.9;
        }

        player.vy += player.gravity; player.y += player.vy;
        if(invul > 0) invul--;

        if(player.y + player.size > canvas.height || player.y < 0) handleHit();

        if(frame % 95 === 0) {
            let gap = Math.max(160, 220 - (score * 1.3));
            let h = Math.random() * (canvas.height - gap - 120) + 60;
            obstacles.push({ x: canvas.width, y: 0, w: 70, h: h, p: false });
            obstacles.push({ x: canvas.width, y: h + gap, w: 70, h: canvas.height });
        }
        frame++;

        for(let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= speed;
            ctx.fillStyle = "#0f172a";
            ctx.strokeStyle = playerColor;
            ctx.lineWidth = 3;
            ctx.strokeRect(o.x, o.y, o.w, o.h);
            ctx.fillRect(o.x, o.y, o.w, o.h);

            if(invul === 0 && player.x < o.x + o.w && player.x + player.size > o.x && player.y < o.y + o.h && player.y + player.size > o.y) {
                handleHit(); break;
            }
            if(o.y === 0 && !o.p && o.x + o.w < player.x) {
                score++; o.p = true; updateUI();
                if(score % 35 === 0) { lives++; updateUI(); spawnParticles(player.x, player.y, "#22c55e"); }
                if(score % 5 === 0) speed += 0.25;
            }
            if(o.x < -100) obstacles.splice(i, 1);
        }
    }

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 5, 5);
        if(p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;

    if(gameState === "PLAYING") {
        ctx.font = player.size + "px Arial";
        if(invul % 10 > 5) ctx.globalAlpha = 0.3;
        ctx.fillText(playerEmoji, player.x, player.y + player.size);
        ctx.globalAlpha = 1;
    }

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    requestAnimationFrame(loop);
}

function handleHit() {
    lives--; shake = 15; invul = 60;
    spawnParticles(player.x, player.y, "#ef4444");
    updateUI();
    if(lives <= 0) gameOver();
    else { player.y = canvas.height/2; player.vy = 0; obstacles = []; }
}

const jump = (e) => { 
    if(e.type === 'touchstart') e.preventDefault();
    if(gameState === "PLAYING") player.vy = player.jump; 
};
window.addEventListener("mousedown", jump);
window.addEventListener("touchstart", jump, {passive: false});

function loadLeaderboard() {
    db.ref("leaderboard").orderByChild("score").limitToLast(10).on("value", snap => {
        let arr = [];
        snap.forEach(c => arr.push(c.val()));
        arr.sort((a, b) => b.score - a.score);
        let h = "";
        arr.forEach((s, i) => h += `<div class="${i===0?'top-score':''}">#${i+1} ${s.name.slice(0,7)}: ${s.score}</div>`);
        document.getElementById("scores").innerHTML = h || "Skor yok";
    });
}
loadLeaderboard();
loop();
</script>
</body>
</html>
