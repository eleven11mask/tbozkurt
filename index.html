<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-BOZKURT AI</title>

<style>

body{
margin:0;
overflow:hidden;
background:#020617;
font-family:Arial;
color:white;
}

canvas{display:block}

#ui{
position:absolute;
top:0;
width:100%;
text-align:center;
}

#stats{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.stat{
background:#0f172a;
padding:6px 10px;
border-radius:10px;
}

#overlay{
position:absolute;
width:100%;
height:100%;
background:#020617ee;
display:flex;
flex-direction:column;
align-items:center;
padding-top:30px;
}

#leaderboard{
background:#0f172a;
padding:15px;
border-radius:15px;
margin-top:20px;
width:260px;
text-align:left;
}

#ability-bar-container{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:200px;
height:16px;
background:#111;
border-radius:10px;
border:2px solid #334155;
}

#ability-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#1e40af,#00f2ff);
}

</style>
</head>

<body>

<div id="ui">

<div id="stats">
<div class="stat">🏆 <span id="curScore">0</span></div>
<div class="stat">💰 <span id="curCoins">0</span></div>
<div class="stat">❤️ <span id="curLives">2</span></div>
</div>

<div id="ability-bar-container" onclick="activateWolf()">
<div id="ability-bar"></div>
</div>

</div>

<div id="overlay">

<h1>T-BOZKURT</h1>

<div id="myBest">Benim Rekorum: 0</div>

<button onclick="start()">BAŞLAT</button>

<div id="leaderboard">
<div id="lb_content">Leaderboard yükleniyor...</div>
</div>

</div>

<canvas id="game"></canvas>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyDJ0LSQIv5KDPC",
authDomain:"kaangame-bfea0.firebaseapp.com",
databaseURL:"https://kaangame-bfea0-default-rtdb.firebaseio.com",
projectId:"kaangame-bfea0"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

let playerName=localStorage.getItem("tb_player")||("Bozkurt_"+Math.floor(Math.random()*999))

/* GAME DATA STRUCTURE */

let gameData={
player:{
bestScore:0,
coins:0,
character:"wolf"
},
inventory:{
characters:["wolf"],
themes:["default"]
}
}

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.onresize=resize

let state="MENU"
let score=0
let coins=0
let lives=2
let frame=0

/* AI DIFFICULTY */

let difficulty={
speed:5,
gap:190,
spawnRate:90
}

function updateDifficulty(){

difficulty.speed=5+(score*0.12)

if(score>50) difficulty.gap=170
if(score>100) difficulty.gap=150
if(score>150) difficulty.spawnRate=70

}

/* PARTICLE ENGINE */

class Particle{

constructor(x,y,type){

this.x=x
this.y=y
this.life=50

if(type==="coin"){
this.vx=(Math.random()-0.5)*3
this.vy=(Math.random()-0.5)*3
this.color="gold"
}

if(type==="hit"){
this.vx=(Math.random()-0.5)*6
this.vy=(Math.random()-0.5)*6
this.color="red"
}

if(type==="orb"){
this.vx=(Math.random()-0.5)*4
this.vy=(Math.random()-0.5)*4
this.color="cyan"
}

}

update(){
this.x+=this.vx
this.y+=this.vy
this.life--
}

draw(){
ctx.globalAlpha=this.life/50
ctx.fillStyle=this.color
ctx.fillRect(this.x,this.y,4,4)
ctx.globalAlpha=1
}

}

let particles=[]

function spawnParticles(x,y,type){

for(let i=0;i<10;i++){
particles.push(new Particle(x,y,type))
}

}

/* PLAYER */

const player={
x:70,
y:200,
vy:0,
gravity:0.5,
jump:-8,
size:38
}

let obstacles=[]
let blueOrbs=0
let wolf=0
let invul=0

function start(){

state="PLAY"
score=0
coins=0
lives=2
frame=0
obstacles=[]

document.getElementById("overlay").style.display="none"

}

function activateWolf(){

if(blueOrbs>=3){
wolf=360
blueOrbs=0
}

}

function hit(){

if(invul>0||wolf>0)return

lives--
invul=80

spawnParticles(player.x,player.y,"hit")

if(lives<=0){

saveScore()
state="MENU"
document.getElementById("overlay").style.display="flex"

}

}

/* LEADERBOARD */

function saveScore(){

const ref=db.ref("leaderboard/"+playerName)

ref.once("value",snap=>{

if(!snap.exists()||score>snap.val().score){
ref.set({name:playerName,score:score})
}

})

}

function loadLeaderboard(){

const lb=document.getElementById("lb_content")

db.ref("leaderboard")
.orderByChild("score")
.limitToLast(3)
.on("value",snap=>{

let data=[]

snap.forEach(c=>data.push(c.val()))

data.sort((a,b)=>b.score-a.score)

let html="<b>🏆 EN İYİ 3</b><br><br>"

data.forEach((p,i)=>{

let medal="🥇"
if(i==1) medal="🥈"
if(i==2) medal="🥉"

html+=`${medal} ${p.name} — ${p.score}<br>`

})

lb.innerHTML=html

})

}

function loadMyBest(){

const ref=db.ref("leaderboard/"+playerName)

ref.on("value",snap=>{
if(snap.exists()){
document.getElementById("myBest").innerText="Benim Rekorum: "+snap.val().score
}
})

}

/* LOOP */

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#010409"
ctx.fillRect(0,0,canvas.width,canvas.height)

if(state==="PLAY"){

updateDifficulty()

let speed=difficulty.speed

player.vy+=player.gravity
player.y+=player.vy

if(frame%difficulty.spawnRate===0){

let h=Math.random()*(canvas.height-difficulty.gap-100)+50

obstacles.push({x:canvas.width,y:0,w:70,h:h,passed:false})
obstacles.push({x:canvas.width,y:h+difficulty.gap,w:70,h:canvas.height})

if(Math.random()>0.7)
obstacles.push({x:canvas.width+100,y:h+difficulty.gap/2,orb:true})

}

obstacles.forEach((o,i)=>{

o.x-=speed

if(o.orb){

ctx.font="28px Arial"
ctx.fillText("🔵",o.x,o.y)

if(Math.hypot(player.x-o.x,player.y-o.y)<40){

blueOrbs=Math.min(3,blueOrbs+1)
spawnParticles(o.x,o.y,"orb")
obstacles.splice(i,1)

}

}

else{

ctx.fillStyle="#1e293b"
ctx.fillRect(o.x,o.y,o.w,o.h)

if(player.x<o.x+o.w&&player.x+player.size>o.x&&player.y<o.y+o.h&&player.y+player.size>o.y){
hit()
}

if(!o.passed&&o.x+o.w<player.x){

score++
coins++
o.passed=true

spawnParticles(o.x,player.y,"coin")

if(score%35===0)lives++

updateStats()

}

}

if(o.x<-100)obstacles.splice(i,1)

})

}

/* PARTICLES */

particles.forEach((p,i)=>{

p.update()
p.draw()

if(p.life<=0)particles.splice(i,1)

})

ctx.font=player.size+"px Arial"
ctx.fillText("🐺",player.x,player.y+player.size)

frame++

requestAnimationFrame(loop)

}

function updateStats(){

document.getElementById("curScore").innerText=score
document.getElementById("curCoins").innerText=coins
document.getElementById("curLives").innerText=lives
document.getElementById("ability-bar").style.width=(blueOrbs/3*100)+"%"

}

window.addEventListener("mousedown",()=>player.vy=player.jump)
window.addEventListener("touchstart",()=>player.vy=player.jump)

loadLeaderboard()
loadMyBest()

loop()

</script>

</body>
</html>
